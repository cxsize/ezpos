# Local dev stack for Cakethakae POS — zero hardware, zero cloud.
#
#   docker compose up                       # full loop: emulator + seed + web
#   docker compose up web                   # browser-only (Expo Web + emulator)
#   docker compose up metro                 # physical device / simulator dev
#   docker compose run --rm seed            # reseed catalog + coupons
#   docker compose run --rm typecheck       # tsc --noEmit
#
# The app runs in a browser at http://localhost:8081 with the hardware
# (printer, scanner, cash drawer) mocked by DevPanel. Fonts are pulled from
# @expo-google-fonts at bundle time, so no manual TTF setup.
#
# The only thing not in Docker is the device-side dev client build — Xcode
# can't run in a container. Run `npx expo prebuild && npx eas build` on the
# host when you're ready to install on a real tablet.

x-node-service: &node-service
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: cakethakae-pos-node:dev
  working_dir: /app
  volumes:
    - .:/app
    - node_modules:/app/node_modules

x-app-env: &app-env
  EXPO_NO_TELEMETRY: "1"
  REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP:-0.0.0.0}
  EXPO_PUBLIC_USE_FIREBASE_EMULATOR: "true"
  EXPO_PUBLIC_FIREBASE_EMULATOR_HOST: ${HOST_IP:-127.0.0.1}
  EXPO_PUBLIC_FIREBASE_PROJECT_ID: demo-cakethakae
  EXPO_PUBLIC_FIREBASE_API_KEY: demo-api-key
  EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-cakethakae.firebaseapp.com
  EXPO_PUBLIC_FIREBASE_APP_ID: demo-app-id
  EXPO_PUBLIC_MOCK_HARDWARE: "true"
  EXPO_PUBLIC_REGISTER_ID: "01"

services:
  emulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.emulator
    image: cakethakae-pos-emulator:dev
    ports:
      - "9099:9099"   # Auth
      - "8080:8080"   # Firestore
      - "4000:4000"   # Emulator UI
      - "4400:4400"   # Emulator Hub
      - "4500:4500"   # Logging
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro
      - ./firestore.rules:/workspace/firestore.rules:ro
      - ./.firebaserc:/workspace/.firebaserc:ro
      - emulator-data:/workspace/emulator-data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4400/emulators >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  seed:
    <<: *node-service
    network_mode: host
    environment:
      FIRESTORE_EMULATOR_HOST: ${HOST_IP:-127.0.0.1}:8080
      FIREBASE_AUTH_EMULATOR_HOST: ${HOST_IP:-127.0.0.1}:9099
      GCLOUD_PROJECT: demo-cakethakae
    depends_on:
      emulator:
        condition: service_healthy
    # Idempotent: safe to run on every `up` via the `web` / `metro` dependency.
    command: ["node", "scripts/seed-catalog.mjs"]

  web:
    <<: *node-service
    ports:
      - "8081:8081"   # Metro + web dev server
      - "19006:19006" # Expo Web (legacy webpack dev server — harmless)
    environment:
      <<: *app-env
    depends_on:
      seed:
        condition: service_completed_successfully
    command: ["npx", "expo", "start", "--web", "--port", "8081"]

  metro:
    <<: *node-service
    profiles: ["device"]
    network_mode: host
    environment:
      <<: *app-env
    depends_on:
      seed:
        condition: service_completed_successfully
    command: ["npx", "expo", "start", "--dev-client", "--lan"]

  typecheck:
    <<: *node-service
    profiles: ["tools"]
    command: ["npx", "tsc", "--noEmit"]

volumes:
  node_modules:
  emulator-data:
