# Local dev stack for Cakethakae POS.
#
#   docker compose up emulator metro     # dev loop: emulator + Metro bundler
#   docker compose run --rm seed         # one-shot: seed catalog + coupons
#   docker compose run --rm typecheck    # tsc --noEmit
#
# iOS / Android builds ("npx eas build") run on the host — Xcode and the
# Android SDK can't meaningfully live inside Docker for a dev loop. On a
# physical device, connect to the Metro bundler at <host-ip>:8081.

services:
  emulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.emulator
    image: cakethakae-pos-emulator:dev
    ports:
      - "9099:9099"   # Auth
      - "8080:8080"   # Firestore
      - "4000:4000"   # Emulator UI
      - "4400:4400"   # Emulator Hub
      - "4500:4500"   # Logging
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro
      - ./firestore.rules:/workspace/firestore.rules:ro
      - ./.firebaserc:/workspace/.firebaserc:ro
      - emulator-data:/workspace/emulator-data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4400/emulators >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  metro:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: cakethakae-pos-node:dev
    working_dir: /app
    # Host networking gives physical devices on the same LAN a path to Metro
    # without port-forwarding fuss. Works on Linux; on Docker Desktop (macOS /
    # Windows) comment this out and use the published ports + --tunnel mode.
    network_mode: host
    # When host-networking is disabled, swap the block above for:
    # ports:
    #   - "8081:8081"
    #   - "19000:19000"
    #   - "19001:19001"
    #   - "19002:19002"
    #   - "19006:19006"
    environment:
      EXPO_NO_TELEMETRY: "1"
      REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP:-0.0.0.0}
      # Point the app at the local emulators. The `emulator` service above
      # exposes these on the host; because we share the host network, localhost
      # resolves to both.
      EXPO_PUBLIC_USE_FIREBASE_EMULATOR: "true"
      EXPO_PUBLIC_FIREBASE_EMULATOR_HOST: ${HOST_IP:-127.0.0.1}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: demo-cakethakae
      EXPO_PUBLIC_FIREBASE_API_KEY: demo-api-key
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-cakethakae.firebaseapp.com
      EXPO_PUBLIC_FIREBASE_APP_ID: demo-app-id
      EXPO_PUBLIC_REGISTER_ID: "01"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      emulator:
        condition: service_healthy
    command: ["npx", "expo", "start", "--dev-client", "--lan"]

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: cakethakae-pos-node:dev
    working_dir: /app
    network_mode: host
    environment:
      FIRESTORE_EMULATOR_HOST: ${HOST_IP:-127.0.0.1}:8080
      FIREBASE_AUTH_EMULATOR_HOST: ${HOST_IP:-127.0.0.1}:9099
      GCLOUD_PROJECT: demo-cakethakae
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      emulator:
        condition: service_healthy
    command: ["node", "scripts/seed-catalog.mjs"]

  typecheck:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: cakethakae-pos-node:dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["npx", "tsc", "--noEmit"]

volumes:
  node_modules:
  emulator-data:
